<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terms of Use – My BP Diary</title>
  <link rel="stylesheet" href="../main.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      justify-content: center;
      align-items: center;
      background-color: var(--surface);
    }
    .landing-card {
      background: white;
      padding: 40px;
      border-radius: var(--radius);
      box-shadow: 0 4px 24px rgba(0,0,0,0.05);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .landing-card h1 { margin-bottom: 24px; color: var(--text-h); font-size: 24px; }
    .lang-buttons { display: grid; gap: 12px; }
    .lang-item {
      display: block;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text-body);
      font-weight: 500;
      transition: all 0.2s;
    }
    .lang-item:hover {
      border-color: var(--accent);
      background: var(--accent-bg);
      color: var(--accent);
    }
    #redirect-msg { margin-top: 20px; font-size: 14px; color: var(--text-muted); }
  </style>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
      if (!window.location.hash) {
        if (lang.startsWith('zh')) {
          window.location.replace('terms-zh.html');
        } else {
          window.location.replace('terms-en.html');
        }
      }
    });
  </script>
</head>
<body>
  <div class="landing-card">
    <h1>My BP Diary</h1>
    <p style="margin-bottom: 24px; color: var(--text-muted);">Please select your language<br>請選擇您的語言</p>
    <div class="lang-buttons">
      <a href="terms-en.html" class="lang-item">English (US)</a>
      <a href="terms-zh.html" class="lang-item">繁體中文 (台灣)</a>
    </div>
    <p id="redirect-msg">Detecting language…</p>
  </div>
</body>
</html>
